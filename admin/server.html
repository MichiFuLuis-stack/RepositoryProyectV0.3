<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página de Administrador - DocPlant</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-header"><div class="logo"><span>DocPlant Admin</span></div></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-nav-item"><span>📊</span><span>Dashboard</span></a>
      <a href="clients.html" class="sidebar-nav-item active"><span>👥</span><span>Clientes</span></a>
      <a href="files.html" class="sidebar-nav-item"><span>📁</span><span>Archivos</span></a>
      <a href="billing.html" class="sidebar-nav-item"><span>💳</span><span>Facturación</span></a>
      <a href="server.html" class="sidebar-nav-item"><span>🖥️</span><span>Servidor</span></a>
      <a href="database.html" class="sidebar-nav-item"><span>🗄️</span><span>Base de Datos</span></a>
    </nav>
  </aside>
  <main class="admin-main">
    <header class="admin-topbar"><h2>Módulo en construcción</h2></header>
    <div class="admin-content" style="padding: 100px 30px;">
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-family: 'Space Grotesk', sans-serif;">Monitoreo del Servidor</h1>
        <span style="display: flex; align-items: center; gap: 5px; color: #10b981; background: rgba(16,185,129,0.1); padding: 5px 12px; border-radius: 20px; font-size: 0.9rem;">
          <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite;"></span>
          En línea
        </span>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
        
        <div class="stat-card" style="background: var(--color-surface); padding: 30px; border-radius: 12px; border: 1px solid var(--color-border); text-align: center;">
          <div style="color: var(--color-text-secondary); font-size: 1rem; margin-bottom: 15px;">Uso de CPU</div>
          <div style="font-size: 3rem; font-weight: bold; color: #3b82f6;" id="cpu-usage">--%</div>
        </div>

        <div class="stat-card" style="background: var(--color-surface); padding: 30px; border-radius: 12px; border: 1px solid var(--color-border); text-align: center;">
          <div style="color: var(--color-text-secondary); font-size: 1rem; margin-bottom: 15px;">Uso de Memoria (RAM)</div>
          <div style="font-size: 2.5rem; font-weight: bold; color: #10b981;" id="memory-usage">-- MB / -- MB</div>
        </div>

        <div class="stat-card" style="background: var(--color-surface); padding: 30px; border-radius: 12px; border: 1px solid var(--color-border); text-align: center;">
          <div style="color: var(--color-text-secondary); font-size: 1rem; margin-bottom: 15px;">Tiempo en Línea (Uptime)</div>
          <div style="font-size: 2.5rem; font-weight: bold; color: #f59e0b;" id="uptime">--h --m</div>
        </div>

      </div>

      <div class="card glass-card" style="padding: 30px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 12px;">
        <h3 style="margin-bottom: 20px;">Información del Sistema</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div style="padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px;">
            <div style="color: var(--color-text-secondary); font-size: 0.9rem; margin-bottom: 5px;">Plataforma / SO</div>
            <div style="font-size: 1.1rem; font-weight: 500;" id="platform">--</div>
          </div>
          <div style="padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px;">
            <div style="color: var(--color-text-secondary); font-size: 0.9rem; margin-bottom: 5px;">Versión de Node.js</div>
            <div style="font-size: 1.1rem; font-weight: 500;" id="node-version">--</div>
          </div>
        </div>
      </div>

    </div>
  </main>
  
  <style>
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>

  <script src="js/api-admin.js"></script>
  <script src="js/admin-server.js"></script>
</body>
</html>
